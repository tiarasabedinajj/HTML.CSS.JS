<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <h1>DIGITAL SCHOOL</h1>
    <h2 id="clock">Clock goes here.</h2>
    <picture>
        <img src="img/img.rar.url" id="TimeImage">
    </picture>
    <h4>SET WAKE UP TIME!</h4>
    <select id="WakeUpTimeSelector">
        <option value="1">1am-2am</option>
        <option value="3">2am-3am</option>
        <option value="5" selected>3am-4am</option>
        <option value="18">4am-5am</option>
        <option value="19">5am-6am</option>
    </select>
<h4>SET DIGITAL SCHOOL CLOCK</h4>
       <select id="dsWakeUpTime">
        <option value="1">1am-2am</option>
        <option value="3"selected>2am-3am</option>
        <option value="5">3am-4am</option>
        <option value="18">4am-5am</option>
        <option value="19">5am-6am</option>
    </select>

    <h4>SET SLEEP TIME</h4>
       <select id="dsWakeUpTime">
        <option value="1" selected>1am-2am</option>
        <option value="3">2am-3am</option>
        <option value="5">3am-4am</option>
        <option value="18">4am-5am</option>
        <option value="19">5am-6am</option>
    </select>
    <br>
    <br>
    <button id="saveButton">SAVE</button>





    <script type="text/javascript" src="js/main.js"></script>

</body>
</html>
